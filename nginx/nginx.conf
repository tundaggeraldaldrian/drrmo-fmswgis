# ============================================================
# SCDRRMO FMSWGIS — Nginx Configuration
#
# Handles:
#   - Reverse proxy to Gunicorn (Django)
#   - Static files (/static/) served directly by Nginx
#   - Media files (/media/) served directly by Nginx
#   - HTTP → HTTPS redirect (when SSL certs are present)
#   - Security headers
# ============================================================

upstream django {
    # Gunicorn is listening on port 8000 inside the web container
    server web:8000;
}

# -------------------------------------------------------
# HTTP server — redirects all traffic to HTTPS
# When SSL is not yet configured, comment out this block
# and use the HTTP block below instead
# -------------------------------------------------------
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# -------------------------------------------------------
# Main server block
# For HTTP-only (initial deployment / no SSL yet): listen 80
# For HTTPS: change to listen 443 ssl and add ssl_ directives
# -------------------------------------------------------
server {
    listen 80;
    server_name _;  # Accept any hostname — change to your domain in production

    # Maximum upload size (profile images, etc.)
    client_max_body_size 10M;

    # -------------------------------------------------------
    # Security headers
    # -------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------
    # Static files — served directly by Nginx (fast, no Django)
    # WhiteNoise also handles /static/ via Gunicorn, but Nginx
    # is faster for direct file serving
    # -------------------------------------------------------
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------
    # Media files — user uploads (profile images, etc.)
    # -------------------------------------------------------
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------
    # All other requests → Gunicorn (Django)
    # -------------------------------------------------------
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts (increase for slow PDF generation)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

