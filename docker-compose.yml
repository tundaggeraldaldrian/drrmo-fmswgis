# ============================================================
# SCDRRMO FMSWGIS — Docker Compose (Production)
#
# Services:
#   db    — PostgreSQL 15 + PostGIS 3.4
#   web   — Django + Gunicorn
#   nginx — Reverse proxy + static/media file serving
#
# Usage:
#   docker compose up -d --build
# ============================================================

services:

  # ----------------------------------------------------------
  # Database: PostgreSQL with PostGIS extension
  # Uses an official PostGIS image that bundles both services
  # ----------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-silaydrrmo_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-silaydrrmo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ----------------------------------------------------------
  # Web application: Django + Gunicorn
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB host to use Docker service name instead of localhost
      DB_HOST: db
    volumes:
      # Persist user-uploaded media files (profile images, etc.)
      - media_data:/app/media
      # Persist collected static files so Nginx can serve them
      - static_data:/app/staticfiles
      # Persist log files
      - log_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend

  # ----------------------------------------------------------
  # Nginx: reverse proxy, SSL termination, static file serving
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Shared volumes from web container for static/media
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      # SSL certificates directory (mount your certs here for HTTPS)
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - frontend

# ----------------------------------------------------------
# Named volumes (persistent storage outside containers)
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
  log_data:
    driver: local

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
